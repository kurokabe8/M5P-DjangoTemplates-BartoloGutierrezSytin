{% load static %}

<html>
    <head>
        <title>The List</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="{% static 'MyInventoryApp/bootstrap/css/custom.css' %}">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

        <style>
            
        html, body {
            height: 100%; 
            margin: 0;
            position: relative; 
            min-height: 100vh;
            padding-bottom: 6rem; 
        }
        body {
            display: flex;
            flex-direction: column; 
            min-height: 100vh; 
        }
        main {
            flex-grow: 1; 

        }
        footer {
           position: absolute;
            bottom: 0;
            height: 6rem; 
            width: 100%;
        }

        .table-container {
            height: 500px;
            overflow: auto; 
        }

        </style>
        
    </head>
    <body class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-dark bg-custom mb-3 sticky-top" style="background-color: #590404;">
            <div class="container-fluid">
                <a class="navbar-brand mb-0" href="{% url 'view_bottles' %}">My Inventory </a>
                <a href="{% url 'add_bottle' %}" style="color:white">
                    <i class="material-icons">add</i>
                </a>
    
            </div>

        </nav>

        <div class="container flex-grow-1">
            <div class="row">

                <!--Side Menu-->
                <div class = "col-3">
                    <ul class = "list-group">
                        {% block sidebar %}
                        <li class="list-group-item"><a href="{% url 'view_bottles' %}">View Bottles</a></li>
                        <li class="list-group-item"><a href="{% url 'view_supplier' %}">View Suppliers</a></li>
                        <li class="list-group-item"><a href="{% url 'add_bottle' %}">Add Bottle</a></li>
                        {% endblock %}
                    </ul>
                </div>

                <!--Main Content-->
                <div class = "col-9">
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </div>  
        
        <footer class="footer bg-custom text-white text-center py-2 mt-auto" style="background-color: #590404; text-align:center; padding:10px;">
            &copy; 2020<!-- Copyright -->
          
        </footer>

    </body>
</html>
